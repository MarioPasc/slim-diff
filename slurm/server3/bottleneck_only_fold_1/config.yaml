# SLIM-Diff PRL pivot — BOTTLENECK-ONLY variant (BottleneckSharedTwinDDPM)
#
# Missing cell of the coupling-continuum 2×2 (PRL pivot plan §4.1):
#   - Enc/dec INDEPENDENT, bottleneck SHARED (signal-coupled).
#   - Completes the table alongside `shared`, `decoupled`, and `zero-coupling`.
#
# Derived from `base_zero_coupling.yaml`. Key divergences:
#   - model.type: "BottleneckSharedTwinDDPM"  (new factory dispatch)
#   - model.channels: [48, 96, 168, 168]      (param-budget probe: 26,352,482 ≈ -2.01% vs 26.9M)
#   - model.num_head_channels: 12             (divides 48, 96, 168 and joint_c=336)
#   - model.norm_num_groups: 12               (divides 48, 96, 168 and joint_c=336)
#   - model.bottleneck_shared: new sub-block — see bottleneck_shared_twin.build_bottleneck_shared_twin
#   - training.devices: 1                     (single-GPU server3; was 2-GPU ddp on Picasso)
#   - training.strategy: removed              (no ddp)
#
# Architecture: two independent SplitForwardUNet branches (in=1/out=1 each) with a single
# shared _BottleneckPath at joint_c=336 channels providing cross-branch signal coupling.
# Class embedding shared by Python object identity (same trick as IndependentTwinDDPM).
#
# Parameter budget: 26,352,482 (Δ = -2.01% vs shared baseline 26,894,210).


# =============================================================================
# Experiment Metadata
# =============================================================================
experiment:
  name: "slimdiff_cr_bottleneck_only_fold_1"
  output_dir: "./outputs/camera_ready/slimdiff_cr_bottleneck_only_fold_1"
  seed: 33

# =============================================================================
# Data Configuration
# =============================================================================
data:
  cache_dir: "./data/slice_cache/folds/fold_1"

  batch_size: 4
  num_workers: 0
  pin_memory: true

  transforms:
    target_spacing: [1.25, 1.25, 1.25]
    roi_size: [160, 160, 160]
    intensity_norm:
      type: "percentile"
      lower: 0.5
      upper: 99.5
      b_min: -1.0
      b_max: 1.0
      clip: true

  slice_sampling:
    z_range: [34, 115]
    filter_empty_brain: true
    brain_threshold: -0.9
    brain_min_fraction: 0.05

  lesion_oversampling:
    enabled: true
    mode: "balance"
    weight: 3.0

# =============================================================================
# Conditioning Configuration
# =============================================================================
conditioning:
  z_bins: 30

  use_sinusoidal: true
  max_z: 159

  cfg:
    enabled: false
    null_token: 60
    dropout_prob: 0.1

# =============================================================================
# Model Configuration — BottleneckSharedTwinDDPM (bottleneck-only coupling)
# =============================================================================
model:
  type: "BottleneckSharedTwinDDPM"
  spatial_dims: 2
  in_channels: 1
  out_channels: 1

  anatomical_conditioning: false
  anatomical_conditioning_method: "concat"
  cross_attention_dim: 256

  anatomical_encoder:
    hidden_dims: [32, 64, 128]
    downsample_factor: 8
    positional_encoding: "sinusoidal"
    norm_num_groups: 8

  # Per-branch channel widths tuned for capacity parity:
  # 2 × indep_branch + shared_bottleneck ≈ 26.35M (-2.0% from 26.9M target).
  channels: [48, 96, 168, 168]
  attention_levels: [false, false, true, true]
  num_res_blocks: 2
  num_head_channels: 12

  norm_name: "GROUP"
  norm_num_groups: 12

  use_class_embedding: true
  dropout: 0.0
  resblock_updown: false
  with_conditioning: false

  # Shared bottleneck sub-block. Auto-selects compatible groups/heads for
  # joint_c = 2 × channels[-1] = 336 when these are null. Explicit values
  # override the auto-selection.
  bottleneck_shared:
    extra_resnet_blocks: 0
    norm_num_groups_joint: null
    num_head_channels_joint: null

# =============================================================================
# Diffusion Scheduler Configuration
# =============================================================================
scheduler:
  type: "DDPM"
  num_train_timesteps: 1000

  schedule: "cosine"

  beta_start: 0.0015
  beta_end: 0.0195
  sig_range: 6.0

  prediction_type: "sample"
  clip_sample: true
  clip_sample_range: 1.0

# =============================================================================
# Sampler Configuration
# =============================================================================
sampler:
  type: "DDIM"
  num_inference_steps: 300
  eta: 0.2

  guidance_scale: 1.0

# =============================================================================
# Training Configuration — single-GPU server3
# =============================================================================
training:
  batch_size: 4
  num_workers: 0
  pin_memory: true

  accelerator: "gpu"
  devices: 1

  self_conditioning:
    enabled: false
    probability: 0.5

  optimizer:
    type: "AdamW"
    lr: 1.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8

  lr_scheduler:
    type: "CosineAnnealingLR"
    T_max: null
    eta_min: 1.0e-6

  max_epochs: 1000
  max_steps: null

  precision: "16-mixed"
  gradient_clip_val: 1.0
  gradient_clip_algorithm: "norm"
  accumulate_grad_batches: 1

  val_check_interval: 1.0
  check_val_every_n_epoch: 1

  early_stopping:
    enabled: true
    monitor: "val/loss"
    patience: 25
    mode: "min"

  ema:
    enabled: true
    decay: 0.999
    update_every: 1
    update_start_step: 0
    store_on_cpu: true
    use_buffers: true
    use_for_validation: true
    export_to_checkpoint: true

# =============================================================================
# Loss Configuration — per-channel Lp with uncertainty weighting
# =============================================================================
loss:
  mode: "twin_lp_norm"

  image_p: 1.5
  mask_p: 2.0

  lp_norm:
    p: 1.5

  uncertainty_weighting:
    enabled: true
    initial_log_vars: [0.0, 0.0]
    learnable: true
    clamp_range: [-5.0, 5.0]

  group_uncertainty_weighting:
    enabled: false
    initial_log_vars: [0.0, 0.5]
    learnable: true
    clamp_range: [-5.0, 5.0]
    intra_group_weights: [1.0, 1.0, 1.0]

  ffl:
    enabled: false
    loss_weight: 1.0
    alpha: 1.35
    patch_factor: 2
    ave_spectrum: false
    log_matrix: true
    batch_matrix: false

  lesion_weighted_image:
    enabled: true
    lesion_weight: 1.0
    background_weight: 1.0

  lesion_weighted_mask:
    enabled: true
    lesion_weight: 1.0
    background_weight: 1.0

# =============================================================================
# Postprocessing Configuration
# =============================================================================
postprocessing:
  zbin_priors:
    enabled: false
    priors_filename: "zbin_priors_brain_roi.npz"
    prob_threshold: 0.20
    dilate_radius_px: 1
    gaussian_sigma_px: 0.7
    min_component_px: 500
    n_first_bins: 5
    max_components_for_first_bins: 3
    relaxed_threshold_factor: 0.1
    fallback: "prior"
    apply_to: ["validation", "visualization", "generation"]
    background_value: -1.0
    use_prior_directly: true

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  log_every_n_steps: 50

  logger:
    type: "wandb"
    wandb:
      project: "jsddpm-epilepsy"
      entity: "mario-pg02-icai-org"
      name: "slimdiff_cr_bottleneck_only_fold_1"
      tags: ["epilepsy", "diffusion", "jsddpm", "prl_pivot", "bottleneck_only", "fold_1"]
      notes: "PRL pivot: bottleneck-only coupling (BottleneckSharedTwinDDPM), fold K"
      offline: true

  checkpointing:
    save_top_k: 1
    monitor: "val/loss"
    mode: "min"
    save_last: false
    every_n_epochs: 1
    filename: "jsddpm-{epoch:04d}-{val_loss:.4f}"

  callbacks:
    gradient_norm:
      enabled: true
      log_every_n_steps: 100

    snr:
      enabled: true
      log_every_n_epochs: 5
      n_samples: 100

    prediction_quality:
      enabled: true
      log_every_n_epochs: 5
      n_samples: 100
      timestep_bins: 10

    diagnostics:
      enabled: false

# =============================================================================
# Visualization Configuration
# =============================================================================
visualization:
  enabled: true
  every_n_epochs: 1

  z_bins_to_show: null
  n_samples_per_condition: 1

  overlay:
    enabled: true
    alpha: 0.5
    color: [255, 0, 0]
    threshold: 0.3

  save_png: true
  save_npz: false

# =============================================================================
# Generation Configuration
# =============================================================================
generation:
  n_per_condition: 100
  z_bins: null
  classes: [0, 1]
  output_format: "npz"
  save_individual: true
  create_index_csv: true
