# SLIM-Diff Camera-Ready Template — ZERO-COUPLING baseline (IndependentTwinDDPM)
#
# SASHIMI 2026 ablation: two independent single-channel DDPMs sharing only
# the conditioning embedding. Completes the coupling continuum:
#   zero coupling (this) → bottleneck-only (decoupled) → full coupling (shared)
#
# Derived from `base_shared.yaml`. Key divergences:
#   - model.type: "IndependentTwinDDPM"   (new; triggers twin factory path)
#   - model.in_channels: 1                (per U-Net, was 2)
#   - model.out_channels: 1               (per U-Net, was 2)
#   - model.channels: [48, 96, 180, 180]  (tuned so 2×UNet + shared_embed ≈ 26.9M)
#   - model.num_head_channels: 20         (divides 180)
#   - model.norm_num_groups: 12           (divides 48, 96, 180)
#   - loss.mode: "twin_lp_norm"           (per-channel Lp in twin module)
#   - loss.image_p: 1.5, loss.mask_p: 2.0 (per-channel exponents from §3 Table 1)
#   - loss.uncertainty_weighting.enabled: true  (Kendall weighting across channels)
#   - training.self_conditioning.enabled: false (not applicable for single-channel UNets)
#   - bottleneck_mode / decoupled_bottleneck: removed (not applicable)
#
# Parameter budget: 2 × 13,440,841 + 153,984 = 27,035,666 (Δ = +0.53% vs shared)


# =============================================================================
# Experiment Metadata
# =============================================================================
experiment:
  name: "slimdiff_cr_zero_coupling_fold_K"
  output_dir: "./outputs/camera_ready/slimdiff_cr_zero_coupling_fold_K"
  seed: 33

# =============================================================================
# Data Configuration
# =============================================================================
data:
  cache_dir: "./data/slice_cache/folds/fold_K"

  batch_size: 16
  num_workers: 0
  pin_memory: true

  transforms:
    target_spacing: [1.25, 1.25, 1.25]
    roi_size: [160, 160, 160]
    intensity_norm:
      type: "percentile"
      lower: 0.5
      upper: 99.5
      b_min: -1.0
      b_max: 1.0
      clip: true

  slice_sampling:
    z_range: [34, 115]
    filter_empty_brain: true
    brain_threshold: -0.9
    brain_min_fraction: 0.05

  lesion_oversampling:
    enabled: true
    mode: "balance"
    weight: 3.0

# =============================================================================
# Conditioning Configuration
# =============================================================================
conditioning:
  z_bins: 30

  use_sinusoidal: true
  max_z: 159

  cfg:
    enabled: false
    null_token: 60
    dropout_prob: 0.1

# =============================================================================
# Model Configuration — IndependentTwinDDPM (zero-coupling baseline)
# =============================================================================
model:
  type: "IndependentTwinDDPM"
  spatial_dims: 2
  in_channels: 1
  out_channels: 1

  anatomical_conditioning: false
  anatomical_conditioning_method: "concat"
  cross_attention_dim: 256

  anatomical_encoder:
    hidden_dims: [32, 64, 128]
    downsample_factor: 8
    positional_encoding: "sinusoidal"
    norm_num_groups: 8

  # Channel widths tuned for capacity parity: 2 × UNet(48→180) ≈ 26.9M total
  channels: [48, 96, 180, 180]
  attention_levels: [false, false, true, true]
  num_res_blocks: 2
  num_head_channels: 20

  norm_name: "GROUP"
  norm_num_groups: 12

  use_class_embedding: true
  dropout: 0.0
  resblock_updown: false
  with_conditioning: false

# =============================================================================
# Diffusion Scheduler Configuration
# =============================================================================
scheduler:
  type: "DDPM"
  num_train_timesteps: 1000

  schedule: "cosine"

  beta_start: 0.0015
  beta_end: 0.0195
  sig_range: 6.0

  prediction_type: "sample"
  clip_sample: true
  clip_sample_range: 1.0

# =============================================================================
# Sampler Configuration
# =============================================================================
sampler:
  type: "DDIM"
  num_inference_steps: 300
  eta: 0.2

  guidance_scale: 1.0

# =============================================================================
# Training Configuration
# =============================================================================
training:
  batch_size: 16
  num_workers: 0
  pin_memory: true

  accelerator: "gpu"
  devices: 2
  strategy: "ddp"

  # Self-conditioning disabled: meaningless for independent single-channel UNets
  self_conditioning:
    enabled: false
    probability: 0.5

  optimizer:
    type: "AdamW"
    lr: 1.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8

  lr_scheduler:
    type: "CosineAnnealingLR"
    T_max: null
    eta_min: 1.0e-6

  max_epochs: 1000
  max_steps: null

  precision: "16-mixed"
  gradient_clip_val: 1.0
  gradient_clip_algorithm: "norm"
  accumulate_grad_batches: 1

  val_check_interval: 1.0
  check_val_every_n_epoch: 1

  early_stopping:
    enabled: true
    monitor: "val/loss"
    patience: 25
    mode: "min"

  ema:
    enabled: true
    decay: 0.999
    update_every: 1
    update_start_step: 0
    store_on_cpu: true
    use_buffers: true
    use_for_validation: true
    export_to_checkpoint: true

# =============================================================================
# Loss Configuration — per-channel Lp with uncertainty weighting
# =============================================================================
loss:
  mode: "twin_lp_norm"

  # Per-channel Lp exponents (from §3 Table 1 best-performing shared cell)
  image_p: 1.5
  mask_p: 2.0

  lp_norm:
    p: 1.5

  uncertainty_weighting:
    enabled: true
    initial_log_vars: [0.0, 0.0]
    learnable: true
    clamp_range: [-5.0, 5.0]

  group_uncertainty_weighting:
    enabled: false
    initial_log_vars: [0.0, 0.5]
    learnable: true
    clamp_range: [-5.0, 5.0]
    intra_group_weights: [1.0, 1.0, 1.0]

  ffl:
    enabled: false
    loss_weight: 1.0
    alpha: 1.35
    patch_factor: 2
    ave_spectrum: false
    log_matrix: true
    batch_matrix: false

  lesion_weighted_image:
    enabled: true
    lesion_weight: 1.0
    background_weight: 1.0

  lesion_weighted_mask:
    enabled: true
    lesion_weight: 1.0
    background_weight: 1.0

# =============================================================================
# Postprocessing Configuration
# =============================================================================
postprocessing:
  zbin_priors:
    enabled: false
    priors_filename: "zbin_priors_brain_roi.npz"
    prob_threshold: 0.20
    dilate_radius_px: 1
    gaussian_sigma_px: 0.7
    min_component_px: 500
    n_first_bins: 5
    max_components_for_first_bins: 3
    relaxed_threshold_factor: 0.1
    fallback: "prior"
    apply_to: ["validation", "visualization", "generation"]
    background_value: -1.0
    use_prior_directly: true

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  log_every_n_steps: 50

  logger:
    type: "wandb"
    wandb:
      project: "jsddpm-epilepsy"
      entity: "mario-pg02-icai-org"
      name: "slimdiff_cr_zero_coupling_fold_K"
      tags: ["epilepsy", "diffusion", "jsddpm", "sashimi2026", "camera_ready", "zero_coupling", "fold_K"]
      notes: "SASHIMI 2026: zero-coupling baseline (IndependentTwinDDPM), fold K"
      offline: true

  checkpointing:
    save_top_k: 1
    monitor: "val/loss"
    mode: "min"
    save_last: false
    every_n_epochs: 1
    filename: "jsddpm-{epoch:04d}-{val_loss:.4f}"

  callbacks:
    gradient_norm:
      enabled: true
      log_every_n_steps: 100

    snr:
      enabled: true
      log_every_n_epochs: 5
      n_samples: 100

    prediction_quality:
      enabled: true
      log_every_n_epochs: 5
      n_samples: 100
      timestep_bins: 10

    diagnostics:
      enabled: false

# =============================================================================
# Visualization Configuration
# =============================================================================
visualization:
  enabled: true
  every_n_epochs: 1

  z_bins_to_show: null
  n_samples_per_condition: 1

  overlay:
    enabled: true
    alpha: 0.5
    color: [255, 0, 0]
    threshold: 0.3

  save_png: true
  save_npz: false

# =============================================================================
# Generation Configuration
# =============================================================================
generation:
  n_per_condition: 100
  z_bins: null
  classes: [0, 1]
  output_format: "npz"
  save_individual: true
  create_index_csv: true
